{% extends "base.html" %}
{% block title %}Register — Secure Login System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="shield-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
            </div>
            <h1 class="auth-title">NEW OPERATOR</h1>
            <p class="auth-subtitle">Register for secure portal access</p>
        </div>

        <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group-cyber">
                <label for="username">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">▸</span>
                    <input type="text" id="username" name="username"
                           class="form-control-cyber" placeholder="3-20 chars, alphanumeric"
                           required maxlength="20" pattern="[a-zA-Z0-9_]{3,20}">
                </div>
            </div>

            <div class="form-group-cyber">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">▸</span>
                    <input type="email" id="email" name="email"
                           class="form-control-cyber" placeholder="you@example.com"
                           required autocomplete="email">
                </div>
            </div>

            <div class="form-group-cyber">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">▸</span>
                    <input type="password" id="password" name="password"
                           class="form-control-cyber" placeholder="Min 8 chars, mixed case + digit + symbol"
                           required autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="password">👁</button>
                </div>
                <div class="password-strength" id="password-strength"></div>
            </div>

            <div class="form-group-cyber">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">▸</span>
                    <input type="password" id="confirm_password" name="confirm_password"
                           class="form-control-cyber" placeholder="Re-enter password"
                           required autocomplete="new-password">
                    <button type="button" class="toggle-password" data-target="confirm_password">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber-primary w-100">REGISTER</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('auth.login') }}">Already have an account? Login</a>
        </div>
    </div>
</div>
{% endblock %}
