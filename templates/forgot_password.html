{% extends "base.html" %}
{% block title %}Forgot Password — Secure Login System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">PASSWORD RECOVERY</h1>
            <p class="auth-subtitle">Enter your registered email address</p>
        </div>

        <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group-cyber">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       class="form-control-cyber" required placeholder="you@example.com">
            </div>

            <button type="submit" class="btn btn-cyber-primary w-100">REQUEST RESET</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('auth.login') }}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
