{% extends "base.html" %}
{% block title %}Reset Password — Secure Login System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">RESET PASSWORD</h1>
            <p class="auth-subtitle">Choose a new secure password</p>
        </div>

        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group-cyber">
                <label for="password">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password"
                           class="form-control-cyber" required>
                    <button type="button" class="toggle-password" data-target="password">👁</button>
                </div>
            </div>

            <div class="form-group-cyber">
                <label for="confirm_password">Confirm Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password"
                           class="form-control-cyber" required>
                    <button type="button" class="toggle-password" data-target="confirm_password">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber-primary w-100">UPDATE PASSWORD</button>
        </form>
    </div>
</div>
{% endblock %}
