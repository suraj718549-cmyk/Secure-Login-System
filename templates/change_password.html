{% extends "base.html" %}
{% block title %}Change Password — Secure Login System{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1 class="auth-title">CHANGE PASSWORD</h1>
        </div>

        <form method="POST" action="{{ url_for('main.change_password') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="form-group-cyber">
                <label for="current_password">Current Password</label>
                <div class="input-wrapper">
                    <input type="password" id="current_password" name="current_password"
                           class="form-control-cyber" required>
                    <button type="button" class="toggle-password" data-target="current_password">👁</button>
                </div>
            </div>

            <div class="form-group-cyber">
                <label for="new_password">New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="new_password" name="new_password"
                           class="form-control-cyber" required>
                    <button type="button" class="toggle-password" data-target="new_password">👁</button>
                </div>
            </div>

            <div class="form-group-cyber">
                <label for="confirm_password">Confirm New Password</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm_password" name="confirm_password"
                           class="form-control-cyber" required>
                    <button type="button" class="toggle-password" data-target="confirm_password">👁</button>
                </div>
            </div>

            <button type="submit" class="btn btn-cyber-primary w-100">UPDATE</button>
        </form>

        <div class="auth-links">
            <a href="{{ url_for('main.dashboard') }}">Back to dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
